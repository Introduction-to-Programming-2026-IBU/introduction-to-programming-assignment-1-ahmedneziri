{% extends "layout.html" %}

{% block body %}
    <h1>Register</h1>

    <!-- TODO: Create a form that POSTs to /register -->

        <!-- TODO: Add a text input for name -->

        <!-- TODO: Add a <select> dropdown for sport:
                   - First option: empty default (value="")
                   - Use a Jinja2 for loop to generate one <option>
                     per sport from the "sports" variable -->

        <!-- TODO: Add a submit button -->

<form action="/register" method="post">

        <input autocomplete="off" autofocus name="name" placeholder="Name" type="text">

        <select name="sport">
            <option disabled selected value="">Sport</option>
            {% for sport in sports %}
                <option value="{{ sport }}">{{ sport }}</option>
            {% endfor %}
        </select>

        <button type="submit">Register</button>

    </form>


{% endblock %}
