<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Final Project — Week 9</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <section id="weather-app" style="text-align: center; font-family: system-ui, sans-serif; padding: 2rem; max-width: 800px; margin: 0 auto;">
    <h2>🌤️ Weather Dashboard</h2>
    
    <form id="search-form" style="margin-bottom: 1rem;">
      <input type="text" id="city-input" placeholder="Enter city name..." required style="padding: 0.5rem; width: 60%;" />
      <button type="submit" style="padding: 0.5rem 1rem;">Search</button>
    </form>
    
    <button id="unit-toggle" style="padding: 0.3rem 0.6rem;">Toggle °C ↔ °F</button>
    
    <div id="recent-searches" style="margin-top: 1rem; display: flex; gap: 0.5rem; justify-content: center; flex-wrap: wrap;"></div>
    
    <div id="status-message" style="margin: 1rem 0; font-weight: bold;"></div>
    
    <div id="weather-dashboard" style="display: none; margin-top: 2rem;">
      <div id="current-weather" style="padding: 1rem; border: 1px solid #ccc; border-radius: 8px; margin-bottom: 2rem;"></div>
      
      <h3>7-Day Forecast</h3>
      <div id="forecast-container" style="display: flex; gap: 1rem; overflow-x: auto; padding: 1rem 0;"></div>
    </div>
  </section>

  <main style="padding: 4rem; text-align: center; font-family: system-ui, sans-serif;">
    <h1>🏗️ Final Project</h1>
    <p>Replace this template with your chosen project. Good luck!</p>
    <p>Options: <strong>A) Weather Dashboard</strong> · <strong>B) Task Manager</strong> · <strong>C) Quiz App</strong></p>
    <p>Read <code>README.md</code> for full instructions.</p>
  </main>

  <script src="script.js"></script>
</body>
</html>
